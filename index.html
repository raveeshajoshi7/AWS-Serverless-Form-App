<!DOCTYPE html><html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Serverless Form App</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }
        input, textarea {
            width: 300px;
            padding: 10px;
            margin: 10px;
        }
        button {
            padding: 10px 20px;
            background-color: #0073e6;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body><h2>Submit Message</h2><form id="myForm">
    <input type="text" id="name" placeholder="Enter your name" required><br>
    <textarea id="message" placeholder="Enter your message" required></textarea><br>
    <button type="submit">Submit</button>
</form><p id="response"></p><script>
document.getElementById("myForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const name = document.getElementById("name").value;
    const message = document.getElementById("message").value;

    try {
        const response = await fetch("https://s5zgewxje9.execute-api.ap-south-1.amazonaws.com/dev/submit", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                name: name,
                message: message
            })
        });

        const data = await response.json();
        document.getElementById("response").innerText = data.message;

    } catch (error) {
        document.getElementById("response").innerText = "Error occurred!";
    }
});
</script></body>
</html>
